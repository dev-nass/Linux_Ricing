
[colors]
background = #1e1e2e
background-alt = #313244
foreground = #cdd6f4
primary = #cba6f7
secondary = #89b4fa
alert = #f38ba8
disabled = #6c7086

[bar/mybar]
width = 100%
height = 24pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

# Using your unified JetBrainsMono Nerd Font for everything
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=11;2"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=11;2"

# Clean layout orientation with brackets [ ] wrapped around groupings
modules-left = lb xworkspaces rb
modules-center = lb date rb
modules-right = lb cpu memory pulseaudio wlan battery rb

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.secondary}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
# Keeping your precise format: Day Date Month Hour:Min
date = %a %d %b %H:%M
label = %date%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 5
format-prefix = "󰘚 "
format-prefix-foreground = ${colors.primary}
# Shows your exact GB usage
label = %used%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.primary}

format-muted = <label-muted>
label-muted = 󰖁 muted
label-muted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC
full-at = 99
poll-interval = 10

format-charging-prefix = "󰂄 "
format-charging-prefix-foreground = ${colors.secondary}
format-charging = <label-charging>
label-charging = %percentage%%
label-charging-foreground = ${colors.foreground}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.primary}
format-full = <label-full>
label-full = %percentage%%

# True portrait battery steps matching the dotfile
ramp-capacity-0 = 󰂃
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = 󰁺
ramp-capacity-1-foreground = ${colors.primary}
ramp-capacity-2 = 󰁼
ramp-capacity-2-foreground = ${colors.primary}
ramp-capacity-3 = 󰁾
ramp-capacity-3-foreground = ${colors.primary}
ramp-capacity-4 = 󰂀
ramp-capacity-4-foreground = ${colors.primary}
ramp-capacity-5 = 󰁹
ramp-capacity-5-foreground = ${colors.primary}

[module/lb]
type = custom/text
format = [
format-foreground = ${colors.disabled}

[module/rb]
type = custom/text
format = ]
format-foreground = ${colors.disabled}

[settings]
screenchange-reload = true
pseudo-transparency = true

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = 󰤨 disconnected
label-disconnected-foreground = ${colors.disabled}

[module/wlan]
inherit = network-base
interface-type = wireless
interface = wlp0s20f3

# Correct execution syntax for Ghostty
click-left = nm-applet --open-connections &

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
label-connected-foreground = ${colors.foreground}

# Dynamic Nerd Font portrait signal bars based on connection strength
ramp-signal-0 = 󰤯
ramp-signal-0-foreground = ${colors.alert}
ramp-signal-1 = 󰤟
ramp-signal-1-foreground = ${colors.primary}
ramp-signal-2 = 󰤢
ramp-signal-2-foreground = ${colors.primary}
ramp-signal-3 = 󰤥
ramp-signal-3-foreground = ${colors.primary}
ramp-signal-4 = 󰤨
ramp-signal-4-foreground = ${colors.secondary}
